# Conda environment for the whole pipeline:
#   conda env create -f environment.yml
#   conda activate water
#
# Notes:
# * gdal brings the GDAL CLI tools (gdalbuildvrt) stages 1-2 shell out to.
# * Everything below ships through conda - nothing downloads at runtime, so
#   the pipeline runs on offline compute nodes once the env is built (only
#   stage 1's culvert-DEM fetch needs internet, and its cache can be
#   pre-populated).
name: water
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy<2
  - rasterio
  - gdal
  - pyproj
  - pysheds
  - pyflwdir
  - numba
  - requests
  - owslib
